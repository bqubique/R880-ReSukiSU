name: Build SM-R960 KernelSU Kernel

on:
  workflow_dispatch:
    inputs:
      ksu_ref:
        description: "KernelSU ref: stable, main, or tag"
        required: true
        default: "stable"
      source_release_tag:
        description: "Release tag containing Kernel.tar.gz and R960XXU1CYK2_Kernel.tar.gz"
        required: true
        default: "source-tarballs"

permissions:
  contents: write

jobs:
  build:
    name: Build SM-R960 KernelSU
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Samsung source tarballs from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          mkdir -p source

          gh release download "${{ github.event.inputs.source_release_tag }}" \
            --repo "${{ github.repository }}" \
            --dir source \
            --pattern "*.tar.gz"

          ls -lh source
          test -f source/Kernel.tar.gz
          test -f source/R960XXU1CYK2_Kernel.tar.gz

      - name: Install build dependencies
        run: |
          set -e
          sudo apt update
          sudo apt install -y \
            build-essential bc bison flex libssl-dev libelf-dev \
            python3 python-is-python3 perl git unzip zip tar lz4 xz-utils zstd \
            clang-14 lld-14 llvm-14 rsync cpio kmod dwarves patch file curl \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi binutils-arm-linux-gnueabi

      - name: Set clang 14 path
        run: |
          set -e
          echo "/usr/lib/llvm-14/bin" >> "$GITHUB_PATH"
          /usr/lib/llvm-14/bin/clang --version
          /usr/lib/llvm-14/bin/ld.lld --version

      - name: Extract Samsung kernel source
        run: |
          set -e
          mkdir -p work/kernel

          tar -xzf source/Kernel.tar.gz -C work/kernel
          tar -xzf source/R960XXU1CYK2_Kernel.tar.gz -C work/kernel --strip-components=1

          find work/kernel/arch/arm64/configs -type f | grep -i "wise6blue"
          ls -la work/kernel | head -50

      - name: Build stock kernel first
        run: |
          set -e
          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="/usr/lib/llvm-14/bin:$PATH"

          make O=out_stock s5e5515-wise6blue_defconfig

          ./scripts/config --file out_stock/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out_stock/.config -d LOCALVERSION_AUTO || true

          make O=out_stock olddefconfig
          grep -E "CONFIG_LOCALVERSION|CONFIG_LOCALVERSION_AUTO" out_stock/.config || true

          make O=out_stock -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist/stock"
          cp out_stock/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/stock/Image-stock-R960"
          cp out_stock/.config "$GITHUB_WORKSPACE/dist/stock/stock.config"

      - name: Add KernelSU
        run: |
          set -e
          cd work/kernel

          if [ "${{ github.event.inputs.ksu_ref }}" = "stable" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -
          else
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s "${{ github.event.inputs.ksu_ref }}"
          fi

          find . -maxdepth 4 \( -iname "*kernelsu*" -o -iname "*ksu*" \) | head -100

      - name: Build KernelSU kernel
        run: |
          set -e
          cd work/kernel

          export PLATFORM_VERSION=16
          export TARGET_SOC=s5e5515
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1
          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_COMPAT=arm-linux-gnueabi-
          export KBUILD_BUILD_USER=dpi
          export KBUILD_BUILD_HOST=VPHORC629
          export PATH="/usr/lib/llvm-14/bin:$PATH"

          make O=out_ksu s5e5515-wise6blue_defconfig

          ./scripts/config --file out_ksu/.config --set-str LOCALVERSION "-33003255-abR960XXU2CZB6" || true
          ./scripts/config --file out_ksu/.config -d LOCALVERSION_AUTO || true

          ./scripts/config --file out_ksu/.config -e KSU || true
          ./scripts/config --file out_ksu/.config -e KERNELSU || true

          make O=out_ksu olddefconfig
          grep -Ei "KSU|KERNELSU|LOCALVERSION" out_ksu/.config || true

          make O=out_ksu -j"$(nproc)"

          mkdir -p "$GITHUB_WORKSPACE/dist/kernelsu"
          cp out_ksu/arch/arm64/boot/Image "$GITHUB_WORKSPACE/dist/kernelsu/Image-KernelSU-R960"
          cp out_ksu/.config "$GITHUB_WORKSPACE/dist/kernelsu/kernelsu.config"

      - name: Package output
        run: |
          set -e
          cd work/kernel

          mkdir -p "$GITHUB_WORKSPACE/dist/modules_stock"
          mkdir -p "$GITHUB_WORKSPACE/dist/modules_ksu"

          find out_stock -type f -name "*.ko" -print -exec cp --parents {} "$GITHUB_WORKSPACE/dist/modules_stock/" \; || true
          find out_ksu -type f -name "*.ko" -print -exec cp --parents {} "$GITHUB_WORKSPACE/dist/modules_ksu/" \; || true

          cd "$GITHUB_WORKSPACE/dist"

          tar -czf R960-stock-modules.tar.gz modules_stock || true
          tar -czf R960-kernelsu-modules.tar.gz modules_ksu || true

          cat > RELEASE_NOTES.txt <<EOF
          SM-R960 Galaxy Watch6 Classic KernelSU Build

          Device: SM-R960 / wise6bl / wise6blue
          Target firmware: R960XXU2CZB6
          Target kernel string: 5.15.180-33003255-abR960XXU2CZB6
          Base source: Kernel.tar.gz from SM-R930_NA_Opensource
          R960 diff: R960XXU1CYK2_Kernel.tar.gz
          Defconfig: s5e5515-wise6blue_defconfig
          KernelSU ref: ${{ github.event.inputs.ksu_ref }}

          Files:
          - Image-KernelSU-R960
          - kernelsu.config
          - Image-stock-R960
          - stock.config
          - R960-stock-modules.tar.gz
          - R960-kernelsu-modules.tar.gz
          - SHA256SUMS.txt

          WARNING:
          Image-KernelSU-R960 is only the raw kernel Image.
          It is not flashable by itself.
          It must be repacked into the matching R960XXU2CZB6 boot.img.
          Do not flash on a locked bootloader.
          EOF

          sha256sum \
            kernelsu/Image-KernelSU-R960 \
            kernelsu/kernelsu.config \
            stock/Image-stock-R960 \
            stock/stock.config \
            R960-stock-modules.tar.gz \
            R960-kernelsu-modules.tar.gz \
            > SHA256SUMS.txt

          find "$GITHUB_WORKSPACE/dist" -maxdepth 3 -type f -print -exec ls -lh {} \;

      - name: Create release tag
        id: vars
        run: |
          TAG="r960-kernelsu-${{ github.run_number }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: SM-R960 KernelSU Build ${{ steps.vars.outputs.tag }}
          body_path: dist/RELEASE_NOTES.txt
          files: |
            dist/kernelsu/Image-KernelSU-R960
            dist/kernelsu/kernelsu.config
            dist/stock/Image-stock-R960
            dist/stock/stock.config
            dist/R960-stock-modules.tar.gz
            dist/R960-kernelsu-modules.tar.gz
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.txt
